<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JARVIS | AI CORE</title>
    <style>
        :root {
            --jarvis: #00f2ff;
            --jarvis-glow: rgba(77, 70, 214, 0.4);
            --bg: #020b10;
            --panel-bg: rgba(0, 15, 25, 0.7);
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at center, transparent 0%, var(--bg) 90%),
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: var(--jarvis);
            font-family: 'Segoe UI', 'Orbitron', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* Scanline Glitch */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), radial-gradient(rgba(0, 242, 255, 0.05), transparent);
            background-size: 100% 4px, 100% 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: 60px 1fr 150px;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            gap: 15px;
        }

        /* Top Bar */
        .top-status {
            grid-column: 1 / 4;
            border-bottom: 1px solid var(--jarvis);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding: 0 10px;
            background: linear-gradient(90deg, var(--panel-bg), transparent, var(--panel-bg));
        }

        /* Panels */
        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(5px);
            position: relative;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .panel::before {
            content: "";
            position: absolute;
            top: -1px; left: -1px;
            width: 15px; height: 15px;
            border-top: 3px solid var(--jarvis);
            border-left: 3px solid var(--jarvis);
        }

        .panel-label {
            font-size: 10px;
            color: #fff;
            background: var(--jarvis);
            padding: 2px 8px;
            align-self: flex-start;
            margin-bottom: 10px;
            color: #000;
            font-weight: bold;
        }

        .terminal {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            overflow-y: auto;
            flex-grow: 1;
            color: rgba(0, 242, 255, 0.7);
        }

        /* THE CORE */
        .center-area {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .jarvis-core {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Ring Art */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--jarvis);
            box-shadow: 0 0 15px var(--jarvis-glow);
        }

        .r-1 { width: 100%; height: 100%; border-style: dashed; animation: rotate 40s linear infinite; opacity: 0.3; }
        .r-2 { width: 85%; height: 85%; border-width: 2px; border-style: dotted; animation: rotate-rev 25s linear infinite; }
        .r-3 { 
            width: 70%; height: 70%; 
            border-width: 10px; 
            border-style: double; 
            border-left-color: transparent; 
            border-right-color: transparent;
            animation: rotate 15s linear infinite;
        }
        
        .static-center {
            z-index: 100;
            text-align: center;
        }

        .jarvis-title {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 0 30px var(--jarvis);
            letter-spacing: 15px;
        }

        .core-status-text {
            font-size: 10px;
            margin-top: 10px;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* Pulse Trigger Class */
        .pulse {
            transform: scale(1.15);
            filter: brightness(2);
        }

        /* Bottom Console */
        .bottom-bar {
            grid-column: 1 / 4;
            display: flex;
            gap: 15px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--jarvis); }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="top-status">
        <div>CORE_ID: NX-8800</div>
        <div id="clock">TIME: 00:00:00</div>
        <div>LINUX EMULATION: ACTIVE</div>
    </div>

    <div class="panel">
        <div class="panel-label">HARDWARE MONITOR</div>
        <div class="terminal" id="hw-logs">
            [OK] THREAD_01: NOMINAL<br>
            [OK] THREAD_02: NOMINAL<br>
            [OK] THREAD_03: NOMINAL<br>
            [!] TEMP: 42°C
        </div>
    </div>

    <div class="center-area">
        <div class="jarvis-core" id="core">
            <div class="ring r-1"></div>
            <div class="ring r-2"></div>
            <div class="ring r-3"></div>
            <div class="static-center">
                <h1 class="jarvis-title">Jarvis</h1>
                <div class="core-status-text" id="status-subtext">SYSTEM IDLE</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-label">NEURAL OUTPUT</div>
        <div class="terminal" id="ai-out">
            > Awaiting user input...
        </div>
    </div>

    <div class="bottom-bar">
        <div class="panel" style="flex: 2;">
            <div class="panel-label">COMMAND HISTORY</div>
            <div class="terminal" id="cmd-history">
                
            </div>
        </div>
        <div class="panel" style="flex: 1;">
            <div class="panel-label">BIO FEEDBACK</div>
            <div class="terminal">
                SIGNAL: STABLE<br>
                LATENCY: 14ms
            </div>
        </div>
    </div>
</div>

<script>
    const core = document.getElementById('core');
    const statusText = document.getElementById('status-subtext');

    // 1. Digital Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = `TIME: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
    }, 1000);

    // 2. Pulse Effect (Call this from Java when AI is "Thinking")
    function jarvisPulse(message = "THINKING...") {
        core.classList.add('pulse');
        statusText.innerText = message;
        
        setTimeout(() => {
            core.classList.remove('pulse');
        }, 500);
    }

    // 3. Update Terminal Logs (Call from Java)
    function logTo(elementId, text) {
        const el = document.getElementById(elementId);
        const timestamp = new Date().toLocaleTimeString().split(' ')[0];
        el.innerHTML += `<div>[${timestamp}] ${text}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    // Auto-scroll simulation for the demo
    setInterval(() => {
        if(Math.random() > 0.8) logTo('hw-logs', 'FAN_SPEED_ADJUST: ' + Math.floor(Math.random()*100) + '%');
    }, 3000);

</script>

</body>
</html>
